<!DOCTYPE html>
<html>
<head>
<title>Birthday Magic Portal</title>
<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: Arial, sans-serif;
  color:white;
  flex-direction:column;
  text-align:center;
}

#sparkleCanvas, #confettiCanvas {
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

#mainText {
  font-size:65px;
  color:white;
  display:none;
  animation: glow 2s infinite alternate;
  z-index:2;
}

#photo {
  display:none;
  margin-top:20px;
  width:200px;
  border-radius:50%;
  border:4px solid gold;
  animation: popIn 1s forwards;
  z-index:2;
}

#secretBtn {
  padding:15px 30px;
  font-size:20px;
  background:linear-gradient(45deg,#ff00ff,#00ffff);
  border:none;
  color:white;
  cursor:pointer;
  margin-top:30px;
  border-radius:30px;
  z-index:2;
  display:none;
}

#secretMessage {
  font-size:25px;
  margin-top:25px;
  display:none;
  color:gold;
  animation: fadeIn 2s forwards;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff; }
  to { text-shadow: 0 0 20px #fff, 0 0 40px #00ffff; }
}

@keyframes popIn {
  from { transform:scale(0); opacity:0; }
  to { transform:scale(1); opacity:1; }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
</style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<div id="mainText">🎉 HAPPY BIRTHDAY GOWTHAM 🎉</div>
<img id="photo" src="https://raw.githubusercontent.com/bhavanapabbathi/birthday/main/gowtham.JPG" alt="Gowtham Photo">
<button id="secretBtn" onclick="showSecret()">Click for Secret Message 🎁</button>
<div id="secretMessage">
You are not just my brother... ❤️<br><br>
You are my strength, my protector, and my forever best friend.<br><br>
May this year bring you happiness, success, and everything you dream of ✨
</div>

<script>
// SPARKLES CANVAS
const sparkleCanvas = document.getElementById('sparkleCanvas');
const ctxS = sparkleCanvas.getContext('2d');
sparkleCanvas.width = window.innerWidth;
sparkleCanvas.height = window.innerHeight;

let sparkles = [];
for(let i=0;i<200;i++){
  sparkles.push({x: Math.random()*sparkleCanvas.width, y: Math.random()*sparkleCanvas.height, r: Math.random()*2+1, dx: (Math.random()-0.5)*2, dy: (Math.random()-0.5)*2});
}

function drawSparkles(){
  ctxS.clearRect(0,0,sparkleCanvas.width,sparkleCanvas.height);
  sparkles.forEach(s=>{
    ctxS.beginPath();
    ctxS.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctxS.fillStyle='white';
    ctxS.fill();
    s.x+=s.dx; s.y+=s.dy;
    if(s.x<0) s.x=sparkleCanvas.width;
    if(s.x>sparkleCanvas.width) s.x=0;
    if(s.y<0) s.y=sparkleCanvas.height;
    if(s.y>sparkleCanvas.height) s.y=0;
  });
  requestAnimationFrame(drawSparkles);
}
drawSparkles();

// SHOW HAPPY BIRTHDAY MESSAGE AFTER SPARKLES
setTimeout(()=>{
  document.getElementById('mainText').style.display='block';
},2000);

// CONFETTI CANVAS
const confettiCanvas = document.getElementById('confettiCanvas');
const ctxC = confettiCanvas.getContext('2d');
confettiCanvas.width = window.innerWidth;
confettiCanvas.height = window.innerHeight;

let confetti = [];

function createConfetti(){
  for(let i=0;i<150;i++){
    confetti.push({
      x: Math.random()*confettiCanvas.width,
      y: Math.random()*confettiCanvas.height,
      r: Math.random()*6+2,
      color: "hsl("+Math.random()*360+",100%,50%)",
      speed: Math.random()*3+2
    });
  }
}

function drawConfetti(){
  ctxC.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confetti.forEach(p=>{
    ctxC.beginPath();
    ctxC.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctxC.fillStyle=p.color;
    ctxC.fill();
    p.y+=p.speed;
    if(p.y>confettiCanvas.height){p.y=0;p.x=Math.random()*confettiCanvas.width;}
  });
  requestAnimationFrame(drawConfetti);
}

// SHOW PHOTO + CONFETTI AFTER MESSAGE
setTimeout(()=>{
  const photo = document.getElementById('photo');
  photo.style.display='block';
  createConfetti();
  drawConfetti();
  document.getElementById('secretBtn').style.display='inline-block';
},4000);

// SECRET MESSAGE
function showSecret(){
  document.getElementById('secretMessage').style.display='block';
}
</script>

</body>
</html>
