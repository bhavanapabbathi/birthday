<!DOCTYPE html>
<html>
<head>
  <title>Colorful Sparkles Demo</title>
  <style>
    body, html { margin:0; height:100%; background:black; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
  <canvas id="sparkleCanvas"></canvas>
  <script>
    const canvas = document.getElementById('sparkleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const sparkles = [];
    const sparkleCount = 200;

    for(let i=0; i < sparkleCount; i++) {
      sparkles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        hue: Math.random() * 360,
        alpha: Math.random() * 0.8 + 0.2,
        alphaChange: (Math.random() * 0.02 + 0.01) * (Math.random() < 0.5 ? 1 : -1)
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      sparkles.forEach(sparkle => {
        sparkle.alpha += sparkle.alphaChange;
        if (sparkle.alpha <= 0.2 || sparkle.alpha >= 1) {
          sparkle.alphaChange = -sparkle.alphaChange;
        }
        ctx.beginPath();
        ctx.arc(sparkle.x, sparkle.y, sparkle.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${sparkle.hue}, 100%, 70%, ${sparkle.alpha})`;
        ctx.shadowColor = `hsla(${sparkle.hue}, 100%, 70%, ${sparkle.alpha})`;
        ctx.shadowBlur = 8;
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
