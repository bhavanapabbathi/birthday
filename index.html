<!DOCTYPE html>
<html>
<head>
<title>Birthday Magic Portal</title>
<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: Arial, sans-serif;
  color:white;
  flex-direction:column;
  text-align:center;
}

#sparkleCanvas, #confettiCanvas {
  position:absolute;
  top:0;
  left:0;
  z-index:0;
  pointer-events:none;
}

#mainText {
  font-size:65px;
  color:white;
  display:none;
  white-space:pre;
  z-index:2;
}

#photo {
  display:none;
  margin-top:20px;
  width:200px;
  border-radius:50%;
  border:4px solid gold;
  animation: popIn 1s forwards;
  z-index:2;
}

#secretBtn {
  padding:15px 30px;
  font-size:20px;
  background:linear-gradient(45deg,#ff00ff,#00ffff);
  border:none;
  color:white;
  cursor:pointer;
  margin-top:30px;
  border-radius:30px;
  z-index:2;
  display:none;
}

#secretMessage {
  font-size:25px;
  margin-top:25px;
  display:none;
  color:gold;
  animation: fadeIn 2s forwards;
}

@keyframes popIn {
  from { transform:scale(0); opacity:0; }
  to { transform:scale(1); opacity:1; }
}
</style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<div id="mainText"></div>
<img id="photo" src="https://raw.githubusercontent.com/bhavanapabbathi/birthday/main/gowtham.JPG" alt="Gowtham Photo">
<button id="secretBtn" onclick="showSecret()">Click for Secret Message 🎁</button>
<div id="secretMessage">
You are not just my brother... ❤️<br><br>
You are my strength, my protector, and my forever best friend.<br><br>
May this year bring you happiness, success, and everything you dream of ✨
</div>

<script>
// -------------- CRACKER-STYLE COLORFUL SPARKLES --------------
const sparkleCanvas = document.getElementById('sparkleCanvas');
const ctxS = sparkleCanvas.getContext('2d');

function resizeCanvas() {
  sparkleCanvas.width = window.innerWidth;
  sparkleCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class CrackerSparkle {
  constructor(){
    this.x = Math.random() * sparkleCanvas.width;
    this.y = Math.random() * sparkleCanvas.height;
    this.size = Math.random() * 2 + 1.5;
    this.hue = Math.random() * 360;
    this.alpha = Math.random() * 0.8 + 0.2;
    this.alphaChange = (Math.random() * 0.03 + 0.02) * (Math.random() < 0.5 ? 1 : -1);
    this.rayCount = Math.floor(Math.random() * 6) + 4; // 4 to 9 rays
    this.rayLength = this.size * 5;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotationSpeed = (Math.random() - 0.5) * 0.02;
  }

  update(){
    this.alpha += this.alphaChange;
    if(this.alpha <= 0.2 || this.alpha >= 1) this.alphaChange = -this.alphaChange;

    this.rotation += this.rotationSpeed;

    // move slowly
    this.x += (Math.random() - 0.5) * 0.3;
    this.y += (Math.random() - 0.5) * 0.3;

    if(this.x < 0) this.x = sparkleCanvas.width;
    if(this.x > sparkleCanvas.width) this.x = 0;
    if(this.y < 0) this.y = sparkleCanvas.height;
    if(this.y > sparkleCanvas.height) this.y = 0;
  }

  draw(ctx){
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    // draw center bright dot
    let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size*3);
    grad.addColorStop(0, `hsla(${this.hue}, 100%, 85%, ${this.alpha})`);
    grad.addColorStop(1, `hsla(${this.hue}, 100%, 60%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, this.size*3, 0, Math.PI*2);
    ctx.fill();

    // draw rays
    ctx.strokeStyle = `hsla(${this.hue}, 100%, 75%, ${this.alpha})`;
    ctx.lineWidth = 1;
    for(let i=0; i < this.rayCount; i++){
      const angle = (i * (2 * Math.PI / this.rayCount));
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(angle)*this.rayLength, Math.sin(angle)*this.rayLength);
      ctx.stroke();
    }
    ctx.restore();
  }
}

let sparkles = [];
const sparkleCount = 150;
for(let i=0; i < sparkleCount; i++){
  sparkles.push(new CrackerSparkle());
}

function animateSparkles(){
  ctxS.clearRect(0,0,sparkleCanvas.width,sparkleCanvas.height);
  sparkles.forEach(s=>{
    s.update();
    s.draw(ctxS);
  });
  requestAnimationFrame(animateSparkles);
}
animateSparkles();

// -------------- TYPEWRITER EFFECT --------------
const text = "🎉 HAPPY BIRTHDAY GOWTHAM 🎉";
const mainTextDiv = document.getElementById('mainText');
let index = 0;

function typeLetter(){
  if(index < text.length){
    mainTextDiv.textContent += text.charAt(index);
    index++;
    setTimeout(typeLetter, 150);
  } else {
    setTimeout(showPhotoConfetti, 500);
  }
}

setTimeout(()=>{
  mainTextDiv.style.display='block';
  typeLetter();
}, 2000);

// -------------- CONFETTI --------------
const confettiCanvas = document.getElementById('confettiCanvas');
const ctxC = confettiCanvas.getContext('2d');
function resizeConfettiCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfettiCanvas();
window.addEventListener('resize', resizeConfettiCanvas);

let confetti = [];
function createConfetti(){
  for(let i=0; i < 150; i++){
    confetti.push({
      x: Math.random() * confettiCanvas.width,
      y: Math.random() * confettiCanvas.height,
      r: Math.random() * 6 + 2,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`,
      speed: Math.random() * 3 + 2
    });
  }
}
function drawConfetti(){
  ctxC.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confetti.forEach(p => {
    ctxC.beginPath();
    ctxC.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctxC.fillStyle = p.color;
    ctxC.fill();
    p.y += p.speed;
    if(p.y > confettiCanvas.height){
      p.y = 0;
      p.x = Math.random() * confettiCanvas.width;
    }
  });
  requestAnimationFrame(drawConfetti);
}

// -------------- SHOW PHOTO + CONFETTI --------------
function showPhotoConfetti(){
  document.getElementById('photo').style.display = 'block';
  document.getElementById('secretBtn').style.display = 'inline-block';
  createConfetti();
  drawConfetti();
}

// -------------- SECRET MESSAGE --------------
function showSecret(){
  document.getElementById('secretMessage').style.display = 'block';
}
</script>

</body>
</html>
