<!DOCTYPE html>
<html>
<head>
<title>Birthday Magic Portal</title>
<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: Arial, sans-serif;
  color:white;
  flex-direction:column;
  text-align:center;
}

#sparkleCanvas {
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

#mainText {
  font-size:65px;
  color:white;
  display:none;
  animation: glow 2s infinite alternate;
  z-index:2;
}

#photo {
  display:none;
  margin-top:20px;
  width:200px;
  border-radius:50%;
  border:4px solid gold;
  animation: popIn 1s forwards;
  z-index:2;
}

#secretBtn {
  padding:15px 30px;
  font-size:20px;
  background:linear-gradient(45deg,#ff00ff,#00ffff);
  border:none;
  color:white;
  cursor:pointer;
  margin-top:30px;
  border-radius:30px;
  z-index:2;
  display:none;
}

#secretMessage {
  font-size:25px;
  margin-top:25px;
  display:none;
  color:gold;
  animation: fadeIn 2s forwards;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff; }
  to { text-shadow: 0 0 20px #fff, 0 0 40px #00ffff; }
}

@keyframes popIn {
  from { transform:scale(0); opacity:0; }
  to { transform:scale(1); opacity:1; }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

canvas {
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>

<div id="mainText">🎉 HAPPY BIRTHDAY GOWTHAM 🎉</div>
<img id="photo" src="https://raw.githubusercontent.com/bhavanapabbathi/birthday/main/gowtham.JPG" alt="Gowtham Photo">
<button id="secretBtn" onclick="showSecret()">Click for Secret Message 🎁</button>
<div id="secretMessage">
You are not just my brother... ❤️<br><br>
You are my strength, my protector, and my forever best friend.<br><br>
May this year bring you happiness, success, and everything you dream of ✨
</div>

<script>
// CANVAS SETUP
const canvas = document.getElementById('sparkleCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let sparkles = [];
for(let i=0;i<200;i++){
  sparkles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2+1,
    dx: (Math.random()-0.5)*2,
    dy: (Math.random()-0.5)*2
  });
}

function drawSparkles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  sparkles.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='white';
    ctx.fill();
    s.x+=s.dx;
    s.y+=s.dy;
    if(s.x<0) s.x=canvas.width;
    if(s.x>canvas.width) s.x=0;
    if(s.y<0) s.y=canvas.height;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(drawSparkles);
}
drawSparkles();

// SHOW HAPPY BIRTHDAY AFTER SPARKLES
setTimeout(()=>{
  document.getElementById('mainText').style.display='block';
},2000);

// CONFETTI
let confetti = [];
function createConfetti(){
  for(let i=0;i<150;i++){
    confetti.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*6+2,
      color: "hsl("+Math.random()*360+",100%,50%)",
      speed: Math.random()*3+2
    });
  }
}
function drawConfetti(){
  confetti.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
    p.y+=p.speed;
    if(p.y>canvas.height){p.y=0;p.x=Math.random()*canvas.width;}
  });
  requestAnimationFrame(drawConfetti);
}

// SHOW PHOTO + CONFETTI AFTER TEXT
setTimeout(()=>{
  const photo = document.getElementById('photo');
  photo.style.display='block';
  createConfetti();
  drawConfetti();
  document.getElementById('secretBtn').style.display='inline-block';
},4000);

// SECRET MESSAGE FUNCTION
function showSecret(){
  document.getElementById('secretMessage').style.display='block';
}
</script>

</body>
</html>
