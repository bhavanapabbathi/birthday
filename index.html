<!DOCTYPE html>
<html>
<head>
<title>Birthday Magic Portal</title>
<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: Arial, sans-serif;
  color:white;
  flex-direction:column;
  text-align:center;
}

#sparkleCanvas, #confettiCanvas {
  position:absolute;
  top:0;
  left:0;
  z-index:0;
  pointer-events:none;
}

#mainText {
  font-size:65px;
  color:white;
  display:none;
  white-space:pre;
  z-index:2;
}

#photo {
  display:none;
  margin-top:20px;
  width:200px;
  border-radius:50%;
  border:4px solid gold;
  animation: popIn 1s forwards;
  z-index:2;
}

#secretBtn {
  padding:15px 30px;
  font-size:20px;
  background:linear-gradient(45deg,#ff00ff,#00ffff);
  border:none;
  color:white;
  cursor:pointer;
  margin-top:30px;
  border-radius:30px;
  z-index:2;
  display:none;
}

#secretMessage {
  font-size:25px;
  margin-top:25px;
  display:none;
  color:gold;
  animation: fadeIn 2s forwards;
}

@keyframes popIn {
  from { transform:scale(0); opacity:0; }
  to { transform:scale(1); opacity:1; }
}
</style>
</head>
<body>

<canvas id="sparkleCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<div id="mainText"></div>
<img id="photo" src="https://raw.githubusercontent.com/bhavanapabbathi/birthday/main/gowtham.JPG" alt="Gowtham Photo">
<button id="secretBtn" onclick="showSecret()">Click for Secret Message 🎁</button>
<div id="secretMessage">
You are not just my brother... ❤️<br><br>
You are my strength, my protector, and my forever best friend.<br><br>
May this year bring you happiness, success, and everything you dream of ✨
</div>

<script>
// -------------- COLORFUL FIREWORKS SPARKLES (from center) --------------
const sparkleCanvas = document.getElementById('sparkleCanvas');
const ctxS = sparkleCanvas.getContext('2d');

function resizeCanvas() {
  sparkleCanvas.width = window.innerWidth;
  sparkleCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let particles = [];

function createFirework() {
  for (let i = 0; i < 100; i++) {
    particles.push({
      x: sparkleCanvas.width/2,
      y: sparkleCanvas.height/2,
      speedX: (Math.random() - 0.5) * 6,
      speedY: (Math.random() - 0.5) * 6,
      radius: 2,
      life: 100,
      hue: Math.random() * 360,
      alpha: 1
    });
  }
}

// Animate fireworks particles
function animateSparkles() {
  ctxS.fillStyle = "rgba(0,0,0,0.2)";
  ctxS.fillRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.speedX;
    p.y += p.speedY;
    p.life--;
    p.alpha = p.life / 100; // fade out

    ctxS.beginPath();
    ctxS.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctxS.fillStyle = `hsla(${p.hue}, 100%, 50%, ${p.alpha})`;
    ctxS.fill();

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
  requestAnimationFrame(animateSparkles);
}

// Initially create fireworks bursts every 1.5 seconds, for about 5 bursts, then stop
let burstsCount = 0;
const maxBursts = 5;

const fireworkInterval = setInterval(() => {
  createFirework();
  burstsCount++;
  if (burstsCount >= maxBursts) {
    clearInterval(fireworkInterval);
    // Start typing message once bursts end
    showBirthdayText();
  }
}, 1500);

// Start animation loop immediately
animateSparkles();

// -------------- TYPEWRITER EFFECT --------------
const text = "🎉 HAPPY BIRTHDAY GOWTHAM 🎉";
const mainTextDiv = document.getElementById('mainText');
let index = 0;

function typeLetter(){
  if(index < text.length){
    mainTextDiv.textContent += text.charAt(index);
    index++;
    setTimeout(typeLetter, 150);
  } else {
    setTimeout(showPhotoConfetti, 500);
  }
}

function showBirthdayText(){
  mainTextDiv.style.display = 'block';
  typeLetter();
}

// -------------- CONFETTI --------------
const confettiCanvas = document.getElementById('confettiCanvas');
const ctxC = confettiCanvas.getContext('2d');

function resizeConfettiCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfettiCanvas();
window.addEventListener('resize', resizeConfettiCanvas);

let confetti = [];
function createConfetti(){
  for(let i=0; i < 150; i++){
    confetti.push({
      x: Math.random() * confettiCanvas.width,
      y: Math.random() * confettiCanvas.height,
      r: Math.random() * 6 + 2,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`,
      speed: Math.random() * 3 + 2
    });
  }
}

function drawConfetti(){
  ctxC.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confetti.forEach(p => {
    ctxC.beginPath();
    ctxC.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctxC.fillStyle = p.color;
    ctxC.fill();
    p.y += p.speed;
    if(p.y > confettiCanvas.height){
      p.y = 0;
      p.x = Math.random() * confettiCanvas.width;
    }
  });
  requestAnimationFrame(drawConfetti);
}

// -------------- SHOW PHOTO + CONFETTI --------------
function showPhotoConfetti(){
  document.getElementById('photo').style.display = 'block';
  document.getElementById('secretBtn').style.display = 'inline-block';
  createConfetti();
  drawConfetti();
}

// -------------- SECRET MESSAGE --------------
function showSecret(){
  document.getElementById('secretMessage').style.display = 'block';
}
</script>

</body>
</html>
